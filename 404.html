<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found</title>
    <script>
        (function () {
            var path = window.location.pathname;
            var parts = path.split("/").filter(Boolean);
            var base = [];
            var index = parts.indexOf("zenG");

            if (index !== -1) {
                base = parts.slice(0, index);
            } else if (window.location.hostname.endsWith(".github.io") && parts.length > 0) {
                base = [parts[0]];
            }

            var target = "/" + base.concat(["zenG", ""]).join("/");
            window.location.replace(target + window.location.search + window.location.hash);
        })();
    </script>
</head>
<body>
    <p>Page not found. Continue to <a href="./zenG/">the portfolio site</a>.</p>
</body>
</html>
